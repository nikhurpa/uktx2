<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to Database Sync</title>
    <link rel="stylesheet" href="styles.css">
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> -->
    <script src="xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Excel to Database Sync</h1>
        
        <div class="upload-section">
            <h2>Upload Files</h2>
            <div class="file-upload">
                <label for="excelFile">Excel File:</label>
                <input type="file" id="excelFile" accept=".xlsx,.xls">
            </div>
            
            <div class="file-upload">
                <label for="configFile">Configuration File:</label>
                <input type="file" id="configFile" accept=".js,.json">
            </div>
            
            <button id="startBtn" class="btn-primary">Start Processing</button>
        </div>

        <div class="progress-section">
            <h2>Processing Status</h2>
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="progressText" class="progress-text">0%</div>
            </div>
            <div id="statusMessages" class="status-messages"></div>
        </div>

        <div class="result-section">
            <h2>Results</h2>
            <div id="resultContainer" class="result-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
